name: infowash
description: 셀프세차장 위치 정보 앱 - 인포워시
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^13.2.1

  # Backend
  supabase_flutter: ^2.8.0

  # Map
  flutter_naver_map: ^1.3.0

  # Location
  geolocator: ^11.1.0
  permission_handler: ^11.3.1

  # Image
  cached_network_image: ^3.4.1

  # Ads
  # TODO: AdMob 활성화 시 아래 주석 해제 후 flutter pub get
  # google_mobile_ads: ^4.0.0

  # Network
  dio: ^5.7.0

  # URL Launcher
  url_launcher: ^6.3.0

  # Deep Link
  app_links: ^6.4.1

  # Local Storage
  shared_preferences: ^2.3.0

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
