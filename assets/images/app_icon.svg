<svg width="100%" viewBox="0 0 680 690" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>infowash app icon</title>
  <desc>infowash - 전국 셀프세차장 위치 공유 앱 아이콘. 위치 핀 모양 안에 자동차 실루엣과 물 효과</desc>

  <defs>
    <clipPath id="pinClip">
      <path d="M 180,280 A 162,162 0 0,1 502,280 L 341,555 Z"/>
    </clipPath>
  </defs>

  <!-- App bg: deep navy rounded square -->
  <rect width="680" height="680" rx="128" fill="#07121E"/>

  <!-- Ambient bubble dots (background layer) -->
  <circle cx="118" cy="148" r="26" fill="#0E2235"/>
  <circle cx="75" cy="272" r="15" fill="#0E2235"/>
  <circle cx="110" cy="530" r="18" fill="#0E2235"/>
  <circle cx="562" cy="138" r="22" fill="#0E2235"/>
  <circle cx="608" cy="268" r="13" fill="#0E2235"/>
  <circle cx="568" cy="522" r="16" fill="#0E2235"/>
  <circle cx="190" cy="608" r="11" fill="#0E2235"/>
  <circle cx="490" cy="610" r="10" fill="#0E2235"/>

  <!-- Location pin main shape (cyan) -->
  <path d="M 180,280 A 162,162 0 0,1 502,280 L 341,555 Z" fill="#07C5DC"/>

  <!-- Pin inner highlight (subtle top-left shine) -->
  <ellipse cx="280" cy="190" rx="56" ry="34" fill="white" opacity="0.10" transform="rotate(-30,280,190)"/>

  <!-- Car group, clipped to pin -->
  <g clip-path="url(#pinClip)">
    <path d="M 258,278 L 280,208 L 402,208 L 424,278 Z" fill="white"/>
    <rect x="222" y="278" width="238" height="70" rx="14" fill="white"/>
    <path d="M 268,273 L 287,218 L 393,218 L 412,273 Z" fill="#05A8BC"/>
    <rect x="334" y="218" width="14" height="55" fill="#07C5DC"/>
    <rect x="228" y="320" width="56" height="30" rx="0" fill="#07C5DC"/>
    <rect x="398" y="320" width="56" height="30" rx="0" fill="#07C5DC"/>
    <circle cx="270" cy="348" r="28" fill="white"/>
    <circle cx="270" cy="348" r="16" fill="#05A8BC"/>
    <circle cx="270" cy="348" r="7" fill="white"/>
    <circle cx="412" cy="348" r="28" fill="white"/>
    <circle cx="412" cy="348" r="16" fill="#05A8BC"/>
    <circle cx="412" cy="348" r="7" fill="white"/>
    <rect x="222" y="283" width="22" height="14" rx="4" fill="#FFE066"/>
    <rect x="438" y="283" width="22" height="14" rx="4" fill="#FF5A5A"/>
  </g>

  <!-- Water spray jets -->
  <line x1="282" y1="158" x2="262" y2="118" stroke="#07C5DC" stroke-width="7" stroke-linecap="round"/>
  <line x1="341" y1="142" x2="341" y2="100" stroke="#07C5DC" stroke-width="7" stroke-linecap="round"/>
  <line x1="400" y1="158" x2="420" y2="118" stroke="#07C5DC" stroke-width="7" stroke-linecap="round"/>

  <!-- Spray droplets -->
  <circle cx="255" cy="108" r="8" fill="#07C5DC"/>
  <circle cx="341" cy="90" r="8" fill="#07C5DC"/>
  <circle cx="427" cy="108" r="8" fill="#07C5DC"/>

  <!-- Side droplet accents -->
  <circle cx="157" cy="358" r="7" fill="#07C5DC" opacity="0.55"/>
  <circle cx="143" cy="378" r="4" fill="#07C5DC" opacity="0.40"/>
  <circle cx="526" cy="355" r="7" fill="#07C5DC" opacity="0.55"/>
  <circle cx="540" cy="375" r="4" fill="#07C5DC" opacity="0.40"/>
</svg>
